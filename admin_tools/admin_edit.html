<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenST 稿件编辑器 (for staff)</title>
    <script src="../tailwind.js"></script>
    <script src="https://cdn.jsdmirror.com/npm/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdmirror.com/npm/marked/marked.min.js"></script>

    <style>
        [v-cloak] { display: none; }
        :root { --brand: #40B5AD; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(64, 181, 173, 0.2); border-radius: 10px; transition: 0.3s; }
        ::-webkit-scrollbar-thumb:hover { background: var(--brand); }

        body {
            background: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            overflow-y: auto;
            padding-bottom: 5rem;
        }

        .markdown-body { line-height: 1.6; color: #ccc; overflow-wrap: break-word; }
        .markdown-body h1 { font-size: 1.5rem; color: #fff; border-bottom: 2px solid var(--brand); padding-bottom: 0.3rem; margin: 1.5rem 0 1rem; }
        .markdown-body h2 { font-size: 1.25rem; border-left: 4px solid var(--brand); padding-left: 0.75rem; margin: 1.2rem 0 0.8rem; }
        .markdown-body h3 { font-size: 1.1rem; color: var(--brand); margin: 1rem 0 0.5rem; font-weight: bold; }
        .markdown-body ul { list-style-type: disc; padding-left: 1.5rem; margin: 1rem 0; }
        .markdown-body blockquote { border-left: 4px solid #2a6a65; padding-left: 1rem; color: #888; background: rgba(64,181,173,0.05); padding: 8px 16px; border-radius: 0 8px 8px 0; }
        .markdown-body code { background: rgba(64,181,173,0.15); color: var(--brand); padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; }
        .markdown-body pre { overflow-x: auto; background: rgba(255, 255, 255, 0.05); padding: 1rem; border-radius: 0.75rem; }
        .markdown-body img { border-radius: 0.5rem; max-width: 100%; }
        .markdown-body a { color: var(--brand); text-decoration: underline; text-underline-offset: 4px; }
    </style>
</head>
<body class="p-6 md:p-12">
<div id="app" v-cloak class="max-w-[1400px] mx-auto">
    <header class="flex justify-between items-end mb-10 border-b border-white/5 pb-6">
        <div>
            <h1 class="text-3xl font-bold text-[--brand] tracking-tight">OpenST Editor</h1>
            <p class="text-white/30 text-sm mt-2 font-mono">Archive: {{ editForm.id }}</p>
        </div>
        <div class="flex gap-4">
            <a href="../archive.html" class="px-5 py-2.5 rounded-xl bg-white/5 hover:bg-white/10 transition-all text-sm border border-white/10">放弃返回</a>
            <button @click="submitSave" :disabled="isSaving"
                    class="px-8 py-2.5 rounded-xl bg-[--brand] text-black font-extrabold hover:scale-105 active:scale-95 transition-all shadow-lg shadow-[#40B5AD]/20 disabled:opacity-50">
                {{ isSaving ? '同步中...' : '提交修改' }}
            </button>
        </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-10 items-start">
        <div class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label class="text-xs font-bold text-white/40 ml-1 uppercase tracking-widest">作品名称</label>
                    <input v-model="editForm.name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[--brand] outline-none transition-all text-lg">
                </div>
                <div class="space-y-2">
                    <label class="text-xs font-bold text-white/40 ml-1 uppercase tracking-widest">作者</label>
                    <input v-model="editForm.author" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-[--brand] outline-none transition-all text-lg">
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-bold text-white/40 ml-1 uppercase tracking-widest">标签分类 (二级/三级均可点选)</label>
                <div class="bg-white/5 p-6 rounded-3xl border border-white/10 space-y-8">
                    <div v-for="(subConfig, mainCat) in TAG_CONFIG" :key="mainCat" class="border-l-2 border-white/10 pl-4">
                        <h3 class="text-sm font-bold text-[--brand] mb-4 flex items-center gap-2">
                            <span class="w-1.5 h-1.5 rounded-full bg-[--brand]"></span>
                            {{ mainCat }}
                        </h3>

                        <div v-if="!Array.isArray(subConfig)" class="space-y-5">
                            <div v-for="(tags, subCat) in subConfig" :key="subCat">
                                <div class="mb-2 flex items-center gap-2">
                                    <button @click="toggleTag(subCat)"
                                            :class="editForm.tags.includes(subCat) ? 'text-[--brand] border-[--brand] bg-[--brand]/10' : 'text-white/30 border-transparent hover:text-white/60'"
                                            class="text-[10px] font-mono uppercase tracking-tighter px-2 py-0.5 border rounded transition-all">
                                        {{ subCat }}
                                    </button>
                                    <span v-if="tags.length === 0" class="text-[9px] text-white/10 font-mono italic">EMPTY SLOT</span>
                                </div>
                                <div class="flex flex-wrap gap-2 ml-2">
                                    <button v-for="tag in tags" :key="tag" @click="toggleTag(tag)"
                                            :class="editForm.tags.includes(tag) ? 'bg-[--brand] text-black border-[--brand]' : 'bg-white/5 text-white/40 border-white/10 hover:border-white/30'"
                                            class="px-2.5 py-1 rounded-lg text-[11px] transition-all border">
                                        {{ tag }}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div v-else class="flex flex-wrap gap-2">
                            <button v-for="tag in subConfig" :key="tag" @click="toggleTag(tag)"
                                    :class="editForm.tags.includes(tag) ? 'bg-[--brand] text-black border-[--brand]' : 'bg-white/5 text-white/40 border-white/10 hover:border-white/30'"
                                    class="px-2.5 py-1 rounded-lg text-[11px] transition-all border">
                                {{ tag }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-xs font-bold text-white/40 ml-1 uppercase tracking-widest">Markdown 内容</label>
                <textarea v-model="editForm.description"
                          class="w-full min-h-[500px] bg-white/5 border border-white/10 p-6 rounded-3xl font-mono text-base outline-none focus:border-[--brand] transition-all resize-none"
                          placeholder="输入内容..."></textarea>
            </div>

            <div class="space-y-4 mt-8">
                <label class="text-xs font-bold text-red-500/60 ml-1 uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" stroke-width="2"/></svg>
                    高级管理 / 危险操作
                </label>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="bg-white/5 border border-white/10 p-5 rounded-3xl flex items-center justify-between group relative overflow-hidden">
                        <div class="flex items-center gap-3 truncate">
                            <div class="p-2.5 rounded-xl bg-[--brand]/10 text-[--brand]">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
                            </div>
                            <div class="flex flex-col truncate">
                                <span class="text-xs font-bold text-white truncate">{{ editForm.filename }}</span>
                                <span class="text-[9px] text-white/30 uppercase font-mono">Litematic File</span>
                            </div>
                        </div>
                        <input type="file" id="file-replace" class="hidden" accept=".litematic" @change="handleLitematicChange">
                        <label for="file-replace" :class="isUploadingLitematic ? 'opacity-0' : 'cursor-pointer hover:bg-[--brand] hover:text-black'"
                               class="px-4 py-2 bg-[--brand]/10 text-[--brand] rounded-xl text-[11px] font-bold transition-all border border-[--brand]/20 shrink-0">
                            替换文件
                        </label>
                        <div v-if="isUploadingLitematic" class="absolute inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-10">
                            <div class="animate-spin rounded-full h-4 w-4 border-2 border-[--brand] border-t-transparent mr-2"></div>
                            <span class="text-[10px] font-bold text-[--brand]">同步中...</span>
                        </div>
                    </div>

                    <button @click="handleDeleteArchive"
                            class="bg-red-500/5 border border-red-500/20 hover:bg-red-500 hover:text-white text-red-500 p-5 rounded-3xl transition-all flex items-center justify-between group">
                        <div class="flex items-center gap-3">
                            <div class="p-2.5 rounded-xl bg-red-500/10 group-hover:bg-white/20">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-width="2"/></svg>
                            </div>
                            <span class="text-xs font-black uppercase tracking-widest">彻底删除此稿件</span>
                        </div>
                        <svg class="w-4 h-4 opacity-30" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <div class="sticky top-6">
            <div class="bg-white/5 border border-white/10 rounded-3xl overflow-hidden shadow-2xl group">
                <div class="px-6 py-4 bg-white/5 border-b border-white/5 flex justify-between items-center">
                    <span class="text-xs font-bold text-white/20 uppercase tracking-[0.2em]">Live Preview / 点击图片更换</span>
                    <div class="flex gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500/20"></div>
                        <div class="w-3 h-3 rounded-full bg-yellow-500/20"></div>
                        <div class="w-3 h-3 rounded-full bg-green-500/20"></div>
                    </div>
                </div>

                <div class="relative aspect-[16/9] bg-black/40 cursor-pointer overflow-hidden" @click="$refs.previewInput.click()">
                    <img :src="currentPreviewUrl" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" :class="{'opacity-30': isUploadingPreview}">

                    <div v-if="isUploadingPreview" class="absolute inset-0 flex items-center justify-center">
                        <div class="animate-spin rounded-full h-8 w-8 border-2 border-[--brand] border-t-transparent"></div>
                    </div>

                    <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex flex-col items-center justify-center gap-2">
                        <svg class="w-8 h-8 text-[--brand]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                        <span class="text-xs font-bold text-white">更换预览图</span>
                    </div>
                    <input type="file" ref="previewInput" class="hidden" accept="image/*" @change="handlePreviewChange">
                </div>

                <div class="p-8 md:p-10 markdown-body min-h-[400px]">
                    <h1 class="!mt-0 !pt-0">{{ editForm.name || 'Untitled' }}</h1>
                    <div v-html="previewHtml"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { TAG_CONFIG } from '../scripts/config.js';
    const { createApp } = Vue;

    createApp({
        data() {
            return {
                isSaving: false,
                isUploadingPreview: false,
                isUploadingLitematic: false,
                TAG_CONFIG,
                editForm: {
                    id: '',
                    sub_id: '',
                    name: '',
                    author: '',
                    tags: [],
                    description: '',
                    preview: '',
                    filename: '',
                    folder: '',
                    submitDate: ''
                },
                WORKER_URL: 'https://openstsubmission.linvin.net'
            }
        },
        computed: {
            previewHtml() {
                marked.setOptions({ breaks: true, gfm: true });
                return marked.parse(this.editForm.description || '_等待输入内容..._');
            },
            currentPreviewUrl() {
                if (!this.editForm.preview) return '';
                if (this.editForm.preview.startsWith('data:image')) return this.editForm.preview;
                const rawPath = decodeURIComponent(this.editForm.preview);
                const safePath = rawPath.split('/').map(s => encodeURIComponent(s)).join('/');
                return `https://cdn.jsdmirror.com/gh/MC-OpenST/website@main/${safePath}`;
            }
        },
        async mounted() {
            const folder = new URLSearchParams(window.location.search).get('folder');
            if (!folder) return;
            try {
                const res = await fetch('../data/database.json');
                const database = await res.json();
                const item = database.find(i => i.id === folder);
                if (item) this.editForm = JSON.parse(JSON.stringify(item));
            } catch (e) { console.error("Load failed", e); }
        },
        methods: {
            toggleTag(tag) {
                const idx = this.editForm.tags.indexOf(tag);
                idx > -1 ? this.editForm.tags.splice(idx, 1) : this.editForm.tags.push(tag);
            },

            // 更换预览图
            async handlePreviewChange(e) {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (ev) => {
                    this.localPreview = ev.target.result;
                };
                reader.readAsDataURL(file);

                this.isUploadingPreview = true;
                try {
                    const auth = JSON.parse(localStorage.getItem('gh_auth'));
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('folder', this.editForm.folder); // 确保是文件夹名

                    const res = await fetch(`${this.WORKER_URL}/api/admin/update-preview`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth?.token}` },
                        body: formData
                    });

                    if (res.ok) {
                        this.editForm.preview = file.name;
                        alert("✅ 预览图已更新");
                    } else {
                        alert("❌ 上传失败");
                    }
                } catch (e) { alert("❌ 网络错误"); }
                finally { this.isUploadingPreview = false; }
            },

            // 更换投影文件
            async handleLitematicChange(e) {
                const file = e.target.files[0];
                if (!file || !file.name.endsWith('.litematic')) return alert("请选择 .litematic 文件");
                if (!confirm(`确定替换投影文件为: ${file.name}?`)) return;

                this.isUploadingLitematic = true;
                try {
                    const auth = JSON.parse(localStorage.getItem('gh_auth'));
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('folder', this.editForm.id);
                    const res = await fetch(`${this.WORKER_URL}/api/admin/replace-litematic`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${auth?.token}` },
                        body: formData
                    });
                    if (res.ok) {
                        this.editForm.filename = file.name;
                        alert("✅ 投影已成功替换");
                    } else alert("❌ 替换失败");
                } catch (e) { alert("❌ 网络错误"); }
                finally { this.isUploadingLitematic = false; }
            },

            // 删除稿件
            async handleDeleteArchive() {
                const confirmID = prompt(`⚠️ 危险操作：此操作将永久删除该存档！\n请输入该存档 ID [ ${this.editForm.id} ] 以确认：`);
                if (confirmID !== this.editForm.id) {
                    if (confirmID !== null) alert("❌ ID 输入错误");
                    return;
                }
                try {
                    const auth = JSON.parse(localStorage.getItem('gh_auth'));
                    const res = await fetch(`${this.WORKER_URL}/api/admin/delete-archive`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${auth?.token}`
                        },
                        body: JSON.stringify({ folder: this.editForm.id })
                    });
                    if (res.ok) {
                        alert("🗑️ 稿件已彻底删除");
                        window.location.href = '../archive.html';
                    } else alert("❌ 删除失败");
                } catch (e) { alert("❌ 请求错误"); }
            },

            // 原有保存逻辑
            async submitSave() {
                if (this.isSaving) return;
                const raw = localStorage.getItem('gh_auth');
                const auth = raw ? JSON.parse(raw) : null;
                const token = auth?.token;
                if (!token) return alert("❌ 认证失效");

                this.isSaving = true;
                const source = this.editForm;
                const stripPath = (s) => (s && typeof s === 'string' && s.includes('/')) ? s.split('/').pop() : s;

                const finalInfoJson = {
                    "id": source.sub_id || source.id,
                    "name": source.name,
                    "author": source.author || '匿名',
                    "tags": Array.isArray(source.tags) ? source.tags : [],
                    "description": source.description,
                    "folder": source.folder || source.name.replace(/[#\\/:*?"<>|]/g, '_'),
                    "preview": stripPath(source.preview) || "preview.png",
                    "filename": stripPath(source.filename),
                    "submitDate": source.submitDate || new Date().toISOString()
                };

                try {
                    const res = await fetch(`${this.WORKER_URL}/api/admin/update-info`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ folder: source.id, newInfo: finalInfoJson })
                    });
                    if (res.ok) {
                        alert("✅ 信息修改成功！");
                        window.location.href = '../archive.html';
                    } else alert("❌ 提交失败");
                } catch (e) { alert("❌ 网络错误"); }
                finally { this.isSaving = false; }
            }
        }
    }).mount('#app');
</script>
</body>
</html>
