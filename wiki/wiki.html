<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>OpenST Wiki</title>
    <link rel="icon" href="../images/favicon.png"></link>
    <link rel="apple-touch-icon" href="../images/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
    <script src="//cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <link rel="stylesheet" href="wiki-style.css">

    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#40B5AD',
                            light: '#5fc7bf',
                            dark: '#2d827c',
                        },
                        panel: 'rgba(255, 255, 255, 0.02)', // 内容卡片背景
                    },
                    // 苹果同款平滑动画曲线
                    transitionTimingFunction: {
                        'apple': 'cubic-bezier(0.16, 1, 0.3, 1)',
                    }
                }
            }
        }
    </script>
    <style>
        #wiki-collab {
            position: relative;
            z-index: 9999;
        }
    </style>
</head>
<script>
    // 监听整个侧边栏的点击事件
    document.addEventListener('click', function (e) {
        // 检查点击的是否是侧边栏里的文件夹标题（父级 li）
        const target = e.target.closest('.sidebar-nav li');

        if (target && target.querySelector('ul')) {
            setTimeout(() => {
                if (target.classList.contains('collapse')) {
                    target.classList.remove('collapse');
                    const childUl = target.querySelector('ul');
                    if (childUl) {
                        childUl.style.display = 'block';
                    }
                }
            }, 10);
        }
    }, true); // 使用捕获模式，确保比 Docsify 插件更早捕获或更可靠执行
</script>
<body>
<div class="soft-bg"></div>
<div id="app">Loading Wiki...</div>
<div id="sidebar-fallback" class="sidebar" style="display:none; position:fixed; left:0; top:0; width:300px; z-index:998;">
    <div class="sidebar-nav">
    </div>
</div>
<div id="wiki-collab"></div>

<script>
    window.$docsify = {
        name: 'OpenST Wiki',
        basePath: 'content/',
        homepage: 'README.md',
        loadSidebar: true,
        auto2top: true,
        mergeNavbar: true,
        themeable: {
            readyTransition: true,
            responsiveTables: true
        },
        search: {
            paths: 'auto',
            placeholder: '在此搜索...',
            noData: '未找到结果',
            depth: 3
        },
        subMaxLevel: 2,
        alias: {
            '/.*/_sidebar.md': '/_sidebar.md'
        },
        plugins: [
            function (hook, vm) {
                // 1. 核心排序逻辑：确保 [标题] -> [搜索框] -> [菜单]
                const arrangeSidebar = () => {
                    const sidebar = document.querySelector('.sidebar');
                    const appName = document.querySelector('.app-name');
                    const search = document.querySelector('.search');
                    const nav = document.querySelector('.sidebar-nav');

                    if (sidebar && appName && search) {
                        // 检查顺序：如果搜索框在标题之前，或者搜索框是第一个子元素
                        if (search.nextElementSibling === appName || search.previousElementSibling === null) {
                            // 强制：将搜索框插在标题 (app-name) 的后面
                            appName.parentNode.insertBefore(search, appName.nextSibling);
                        }
                    }
                };

                // 2. 同步影子容器 (iPad 兼容)
                const syncShadow = () => {
                    const realNav = document.querySelector('.sidebar');
                    const fallbackNav = document.querySelector('#sidebar-fallback');
                    if (realNav && fallbackNav && realNav.innerHTML.trim() !== "") {
                        if (fallbackNav.innerHTML !== realNav.innerHTML) {
                            fallbackNav.innerHTML = realNav.innerHTML;
                        }
                    }
                };

                // 3. 监听器：只要侧边栏内容变动（插件注入），立刻纠正
                hook.ready(() => {
                    const sidebar = document.querySelector('.sidebar');
                    if (sidebar) {
                        const observer = new MutationObserver(() => {
                            arrangeSidebar();
                            syncShadow();
                        });
                        observer.observe(sidebar, {childList: true, subtree: true});
                    }
                    arrangeSidebar();
                });

                hook.doneEach(() => {
                    arrangeSidebar();
                    syncShadow();
                    // Safari 补丁：电脑端强行移除关闭状态类
                    if (window.innerWidth > 1024) {
                        document.body.classList.remove('close');
                    }
                });
            }
        ]
    }
    // 2. 处理初始状态（移动端默认关闭）
    if (window.innerWidth <= 1024) {
        document.documentElement.classList.add('close');
        document.body.classList.add('close');
    }

    // 3. 点击外部自动收起（移动端专用）
    document.addEventListener('click', function(e) {
        if (window.innerWidth > 1024) return;
        const body = document.body;
        const sidebar = document.querySelector('.sidebar');
        const toggleBtn = document.querySelector('.sidebar-toggle');
        if (!body.classList.contains('close') &&
            sidebar && !sidebar.contains(e.target) &&
            toggleBtn && !toggleBtn.contains(e.target)) {
            toggleBtn.click();
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
<script src="//unpkg.com/docsify-count/dist/countable.min.js"></script>

<script src="wiki-core.js" type="module"></script>
</body>
</html>
