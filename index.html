<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OpenST 档案馆：归档、转换并在线预览 Minecraft 优秀储电作品。提供精密机器存档下载与 WebGL 投影预览。">
    <link rel="preconnect" href="https://cdn.jsdmirror.com">
    <link rel="icon" href="images/favicon.png">
    <link rel="apple-touch-icon" href="images/favicon.png">
    <title>OpenST | Portal</title>
    <script src="tailwind.js"></script>
    <style>
        :root { --brand-color: #40B5AD; }

        body {
            background: #0c0c0c;
            color: #d1d1d6;
            font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 纯净背景 */
        .soft-bg {
            position: absolute; inset: 0;
            background: radial-gradient(circle at center, #151515 0%, #0c0c0c 100%);
            z-index: 0;
        }

        /* 卡片设计：极致干净，取消所有自动生成的干扰字体 */
        .portal-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.6s cubic-bezier(0.15, 0.8, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* 鼠标悬停效果：仅光影变化，无文字干扰 */
        .portal-card:hover {
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-4px);
        }

        /* 特殊处理：档案馆悬停时边框亮起品牌色 */
        .archive-hover:hover { border-color: rgba(64, 181, 173, 0.4); }
        /* Wiki 悬停时边框亮起蓝色 */
        .wiki-hover:hover { border-color: rgba(59, 130, 246, 0.4); }
        /* 投影版本转换：悬停亮起极光紫 */
        .converter-hover:hover { border-color: rgba(159, 122, 234, 0.4); }
        /* 投影预览：悬停亮起科技黄 */
        .preview-hover:hover { border-color: rgba(245, 158, 11, 0.4); }

        .breath-light {
            width: 4px; height: 4px;
            background: var(--brand-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--brand-color);
            opacity: 0.4;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-8 relative">
<div class="soft-bg"></div>

<script>
    if (window.location.search.length > 1) {
        window.location.href = 'archive.html' + window.location.search;
    }
</script>

<div class="relative z-10 w-full max-w-5xl">
    <header class="mb-24 flex items-center gap-6">
        <h1 class="text-3xl font-bold tracking-tight text-[#f5f5f7]">OpenST</h1>
        <div class="h-px flex-1 bg-white/5"></div>
        <div id="credits-trigger" class="flex items-center gap-2 text-[10px] text-gray-600 tracking-widest uppercase">
            <div class="breath-light"></div>
            System Active
        </div>
    </header>

    <nav class="grid grid-cols-1 md:grid-cols-2 gap-10">

        <a href="https://wiki.openst.qzz.io" target="_blank" class="portal-card wiki-hover group rounded-[2.5rem] p-12">
            <h2 class="text-2xl font-semibold mb-4 text-[#e5e5e7]">Wiki</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-10 max-w-xs">这是wiki</p>
            <div class="text-blue-400/60 text-xs font-medium group-hover:text-blue-400 transition-colors tracking-wide">
                READ DOCUMENTATION ↗
            </div>
        </a>

        <a href="archive.html" target="_blank" class="portal-card archive-hover group rounded-[2.5rem] p-12">
            <h2 class="text-2xl font-semibold mb-4 text-[#e5e5e7]">档案馆</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-10 max-w-xs">归档了大量优秀的作品，欢迎游览</p>
            <div class="text-[#40B5AD] opacity-60 group-hover:opacity-100 transition-opacity text-xs font-medium tracking-wide">
                EXPLORE REPOSITORY ↗
            </div>
        </a>

        <a href="Extra-Function/litematic-converter/index.html" target="_blank" class="portal-card converter-hover group rounded-[2.5rem] p-12">
            <h2 class="text-2xl font-semibold mb-4 text-[#e5e5e7]">投影版本转换</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-10 max-w-xs">转换投影版本！</p>
            <div class="text-[#9F7AEA] opacity-60 group-hover:opacity-100 transition-opacity text-xs font-medium tracking-wide">
                CONVERTER NOW ↗
            </div>
        </a>

        <a href="Extra-Function/litematic-preview/index.html" target="_blank" class="portal-card preview-hover group rounded-[2.5rem] p-12">
            <h2 class="text-2xl font-semibold mb-4 text-[#e5e5e7]">投影预览</h2>
            <p class="text-gray-500 text-sm leading-relaxed mb-10 max-w-xs">网页webGL投影预览</p>
            <div class="text-[#F59E0B] opacity-60 group-hover:opacity-100 transition-opacity text-xs font-medium tracking-wide">
                EXPLORE LITEMATIC ↗
            </div>
        </a>

    </nav>

    <footer class="mt-24 text-[9px] text-gray-800 tracking-[0.4em] uppercase text-center font-medium">
        <span>© 2026 MC-OpenST · Open Storage Tech</span>
    </footer>
</div>

<script>
    (function() {
        let clickCount = 0;
        let lastClickTime = 0;
        const secretTrigger = document.getElementById('credits-trigger');

        if (secretTrigger) {
            secretTrigger.addEventListener('click', () => {
                const currentTime = Date.now();
                if (currentTime - lastClickTime > 800) {
                    clickCount = 0;
                }

                clickCount++;
                lastClickTime = currentTime;
                secretTrigger.style.filter = 'brightness(2)';
                secretTrigger.style.transition = 'filter 0.1s';
                setTimeout(() => { secretTrigger.style.filter = 'brightness(1)'; }, 100);

                if (clickCount === 5) {
                    clickCount = 0;
                    const transitionHTML = `
        <div class="scan-line"></div>
        <div id="app" class="relative z-10 text-center px-6 animate-in fade-in duration-700">
            <div id="searching" class="space-y-6">
                <div class="relative w-24 h-24 mx-auto">
                    <div class="absolute inset-0 border-4 border-[#40B5AD]/10 rounded-full"></div>
                    <div class="absolute inset-0 border-4 border-t-[#40B5AD] rounded-full animate-spin"></div>
                </div>
                <div class="space-y-2">
                    <h2 class="text-2xl font-black tracking-[0.3em] text-[#40B5AD] brand-shadow uppercase">Bypassing...</h2>
                    <p id="inject-log" class="text-white/30 font-mono text-sm tracking-widest">GATE: /profile/april/december/...</p>
                </div>
            </div>
        </div>
    `;
                    const style = document.createElement('style');
                    style.innerHTML = `
        body { background: #0a0a0a !important; overflow: hidden !important; transition: all 0.5s; }
        .scan-line { width: 100%; height: 2px; background: linear-gradient(90deg, transparent, #40B5AD, transparent); position: absolute; top: -2px; animation: scan 3s linear infinite; opacity: 0.3; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        .brand-shadow { text-shadow: 0 0 20px rgba(64, 181, 173, 0.5); }
    `;
                    document.head.appendChild(style);
                    document.body.innerHTML = transitionHTML;
                    const logs = ["SPOOFING_IP...", "DECRYPTING_V_FILES...", "ACCESS_GRANTED"];
                    let i = 0;
                    const logEl = document.getElementById('inject-log');
                    const interval = setInterval(() => {
                        if (i < logs.length) {
                            logEl.innerText = `STATUS: ${logs[i]}`;
                            i++;
                        } else {
                            clearInterval(interval);
                            document.body.style.opacity = '0';
                            setTimeout(() => {
                                window.location.href = 'profile/april/december/credits.html';
                            }, 600);
                        }
                    }, 500);
                }
            });
        }
    })();
</script>
<script>
    console.log(
        "%c如果你并非网页开发人员，请勿在控制台内输入任何人传给你的脚本！\n%c在控制台输入脚本可能会让攻击者盗取你的 GitHub 访问令牌（Token），从而控制你的仓库或篡改数据。",
        "color: #333; font-size: 16px; font-weight: bold;",
        "color: red; font-size: 14px;"
    );
</script>
<script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "OpenST Portal",
        "url": "https://openst.qzz.io",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://openst.qzz.io/archive.html?search={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
</script>
</body>
</html>
